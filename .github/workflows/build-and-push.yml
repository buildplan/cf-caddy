name: Build and Push CF-Caddy

on:
  repository_dispatch:
    types: [caddy-release, cloudflare-release]
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'dev'
    paths:
      - '.github/workflows/build-and-push.yml'
      - 'caddy.Dockerfile'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: cf-caddy
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEFAULT_GO_VERSION: 1.26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # --- FETCH VERSIONS ---
      - name: Fetch Latest Available Caddy Version
        id: caddy
        run: |
          RECENT_TAGS=$(gh api /repos/caddyserver/caddy/releases --jq '.[0:5] | .[].tag_name')
          FOUND_TAG=""
          FOUND_VERSION=""
          echo "Looking for the newest Caddy release that is actually published on Docker Hub..."
          for TAG in $RECENT_TAGS; do
            VERSION=$(echo "${TAG}" | sed 's/^v//')
            echo "Checking Caddy ${VERSION}..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/library/caddy/tags/${VERSION}-alpine")
            if [ "$HTTP_STATUS" == "200" ]; then
              echo "Success! Caddy ${VERSION} is available on Docker Hub."
              FOUND_TAG=$TAG
              FOUND_VERSION=$VERSION
              break
            else
              echo "⚠️ Caddy ${VERSION} is not on Docker Hub yet. Falling back to the previous release..."
            fi
          done
          if [ -z "$FOUND_VERSION" ]; then
            echo "❌ ERROR: Could not find ANY of the 5 most recent Caddy releases on Docker Hub."
            exit 1
          fi
          echo "CADDY_TAG=${FOUND_TAG}" >> $GITHUB_ENV
          echo "CADDY_VERSION=${FOUND_VERSION}" >> $GITHUB_ENV

      - name: Fetch Latest Cloudflare Plugin Version
        id: cloudflare
        run: |
          CF_TAG=$(gh api /repos/caddy-dns/cloudflare/tags --jq '.[0].name')
          CF_VERSION=$(echo "${CF_TAG}" | sed 's/^v//')
          echo "CF_VERSION=${CF_VERSION}" >> $GITHUB_ENV

      - name: Fetch Required Go Version
        id: go_version
        run: |
          GO_VERSION_URL="https://raw.githubusercontent.com/caddyserver/caddy/${{ env.CADDY_TAG }}/go.mod"
          DYNAMIC_GO_VERSION=$(curl -sL --fail "${GO_VERSION_URL}" | grep -oP "^go \K[0-9]+\.[0-9]+" || true)

          if [[ -n "${DYNAMIC_GO_VERSION}" ]]; then
            echo "GO_VERSION=${DYNAMIC_GO_VERSION}" >> $GITHUB_ENV
            echo "Using Go floating tag: ${DYNAMIC_GO_VERSION}"
          else
            echo "GO_VERSION=${{ env.DEFAULT_GO_VERSION }}" >> $GITHUB_ENV
          fi

      # --- BUILD AND PUSH ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./caddy.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            CADDY_VERSION=${{ env.CADDY_VERSION }}
            CF_VERSION=${{ env.CF_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.CADDY_VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.CADDY_VERSION }}-cf-${{ env.CF_VERSION }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Custom Caddy with Cloudflare DNS and IP plugins
            org.opencontainers.image.version=${{ env.CADDY_VERSION }}-cf-${{ env.CF_VERSION }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CADDY_VERSION }}-cf${{ env.CF_VERSION }}
          name: "Caddy ${{ env.CADDY_VERSION }} + CF ${{ env.CF_VERSION }}"
          body: |
            Automated build of Caddy v${{ env.CADDY_VERSION }} with Cloudflare DNS v${{ env.CF_VERSION }} and Cloudflare IP source plugin.

            - **Image:** `ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.CADDY_VERSION }}-cf-${{ env.CF_VERSION }}`
            - Caddy: https://github.com/caddyserver/caddy/releases/tag/v${{ env.CADDY_VERSION }}
            - Cloudflare Plugin: https://github.com/caddy-dns/cloudflare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old GHCR images
        uses: quartx-analytics/ghcr-cleaner@v1
        with:
          owner-type: user
          token: ${{ secrets.PAT_TOKEN }}
          repository-owner: ${{ github.repository_owner }}
          repository-name: ${{ env.IMAGE_NAME }}
          delete-untagged: true
          keep-at-most: 10
